services:
  aiyxdata_tradar:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGETARCH: amd64
    image: aiyxdata-tradar:1.01.0609
    container_name: aiyxdata_tradar
    restart: unless-stopped
    working_dir: /app

    ports:
      - "127.0.0.1:8084:${WEBSERVER_PORT:-8080}"

    volumes:
      - ./config:/app/config
      - ./output:/app/output
      - ./aiyxdata_tradar:/app/aiyxdata_tradar
      - ./docker/manage.py:/app/manage.py
      - ./docker/server.py:/app/server.py
      - ./docker/server.py:/app/docker/server.py
      - ./docker/entrypoint.sh:/entrypoint.sh

    environment:
      - TZ=Asia/Shanghai
      - ENABLE_WEBSERVER=${ENABLE_WEBSERVER:-true}
      - WEBSERVER_PORT=${WEBSERVER_PORT:-8080}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DINGTALK_WEBHOOK_URL=${DINGTALK_WEBHOOK_URL:-}
      - WEWORK_WEBHOOK_URL=${WEWORK_WEBHOOK_URL:-}
      - WEWORK_MSG_TYPE=${WEWORK_MSG_TYPE:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - EMAIL_TO=${EMAIL_TO:-}
      - EMAIL_SMTP_SERVER=${EMAIL_SMTP_SERVER:-}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-}
      - NTFY_SERVER_URL=${NTFY_SERVER_URL:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - NTFY_TOKEN=${NTFY_TOKEN:-}
      - BARK_URL=${BARK_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - GENERIC_WEBHOOK_URL=${GENERIC_WEBHOOK_URL:-}
      - GENERIC_WEBHOOK_TEMPLATE=${GENERIC_WEBHOOK_TEMPLATE:-}
      - AI_ANALYSIS_ENABLED=${AI_ANALYSIS_ENABLED:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_API_BASE=${AI_API_BASE:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_REGION=${S3_REGION:-}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-*/30 * * * *}
      - RUN_MODE=${RUN_MODE:-cron}
      - IMMEDIATE_RUN=${IMMEDIATE_RUN:-true}

  aiyxdata_tradar-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
      args:
        TARGETARCH: amd64
    image: aiyxdata-tradar-mcp:1.01.0609
    container_name: aiyxdata_tradar-mcp
    restart: unless-stopped

    ports:
      - "127.0.0.1:3333:3333"

    volumes:
      - ./config:/app/config:ro
      - ./output:/app/output

    environment:
      - TZ=Asia/Shanghai
