
    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TrendRadar | V1.01.0312</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;800&display=swap');

            :root {
                --bg-color: #f7fafc;
                --card-bg: rgba(255, 255, 255, 0.85);
                --text-primary: #1e293b;
                --text-secondary: #64748b;
                --accent-cyan: #00f2ff;
                --accent-magenta: #ff00ff;
                --accent-lime: #39ff14;
                --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
                --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
                --shadow-neon: 0 0 20px rgba(0, 242, 255, 0.2);
                --glass-bg: rgba(255, 255, 255, 0.7);
                --glass-border: rgba(255, 255, 255, 0.3);
            }

            * { box-sizing: border-box; }
            
            body {
                font-family: 'Inter', 'Noto Sans SC', sans-serif;
                margin: 0;
                padding: 40px 20px;
                background-color: var(--bg-color);
                background-image: 
                    radial-gradient(at 0% 0%, rgba(0, 242, 255, 0.05) 0px, transparent 50%),
                    radial-gradient(at 100% 0%, rgba(255, 0, 255, 0.05) 0px, transparent 50%);
                color: var(--text-primary);
                line-height: 1.6;
                overflow-x: hidden;
            }

            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
                animation: fadeInUp 0.8s ease-out;
            }

            /* Header Section - Inspired by User Reference */
            .header {
                background: #ffffff;
                padding: 30px 40px;
                border-radius: 24px;
                box-shadow: var(--shadow-md);
                margin-bottom: 40px;
                position: relative;
                border-top: 6px solid var(--accent-cyan);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
                z-index: 10; /* Lower than modal */
            }

            .header-top-tag {
                font-size: 11px;
                font-weight: 800;
                color: #3b82f6;
                letter-spacing: 2px;
                text-transform: uppercase;
            }

            .header-main {
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
                margin: 10px 0;
            }

            .header-title-group {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .header-title {
                font-size: 36px;
                font-weight: 900;
                color: #0f172a;
                margin: 0;
                letter-spacing: -1px;
            }

            .version-tag {
                font-size: 13px;
                font-weight: 700;
                color: #94a3b8;
                background: #f1f5f9;
                padding: 2px 10px;
                border-radius: 6px;
            }

            .header-buttons {
                position: absolute;
                right: 0;
                display: flex;
                gap: 10px;
            }

            .header-btn {
                padding: 10px 20px;
                border-radius: 12px;
                font-size: 13px;
                font-weight: 700;
                border: 1px solid #e2e8f0;
                background: #ffffff;
                cursor: pointer;
                transition: all 0.2s;
                color: #475569;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .header-btn:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateY(-2px); }
            .header-btn-primary { background: #00a8e8; color: white; border: none; }
            .header-btn-primary:hover { background: #0091c7; }

            .meta-box {
                background: #f8fafc;
                border-radius: 16px;
                padding: 20px 40px;
                display: flex;
                gap: 50px;
                box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            }

            .meta-entry {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 5px;
            }

            .meta-key {
                font-size: 10px;
                font-weight: 800;
                color: #94a3b8;
                letter-spacing: 1px;
                text-transform: uppercase;
            }

            .meta-val {
                font-size: 18px;
                font-weight: 800;
                color: #1e293b;
            }

            /* Grid Layout for Cards */
            .cards-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
                gap: 30px;
            }

            /* Topic Card */
            .card {
                background: #ffffff;
                border-radius: 20px;
                overflow: hidden;
                box-shadow: var(--shadow-sm);
                display: flex;
                flex-direction: column;
                height: 600px; /* Slightly taller to show ~10 items */
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                border: 1px solid #f1f5f9;
            }

            .card:hover {
                transform: translateY(-8px);
                box-shadow: var(--shadow-md), 0 10px 20px rgba(0,0,0,0.05);
            }

            .card-header {
                padding: 20px 24px;
                background: #ffffff;
                border-bottom: 1px solid #f1f5f9;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-top: 5px solid #ddd;
            }

            .card-title {
                font-weight: 800;
                font-size: 18px;
                color: #0f172a;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .card-count {
                font-size: 13px;
                background: #f1f5f9;
                padding: 4px 12px;
                border-radius: 8px;
                color: #64748b;
                font-weight: 700;
            }

            .card-body {
                padding: 0;
                flex-grow: 1;
                overflow-y: auto;
                scrollbar-width: thin;
                scrollbar-color: #cbd5e1 transparent;
            }

            .card-body::-webkit-scrollbar { width: 4px; }
            .card-body::-webkit-scrollbar-track { background: transparent; }
            .card-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

            .news-list {
                list-style: none;
                padding: 0;
                margin: 0;
            }

            .news-item {
                padding: 16px 24px;
                border-bottom: 1px solid #f8fafc;
                display: flex;
                gap: 15px;
                transition: background 0.2s;
            }

            .news-item:hover {
                background: #fcfdfe;
            }

            .news-item:last-child { border-bottom: none; }

            .news-rank {
                font-size: 14px;
                font-weight: 800;
                color: #e2e8f0;
                min-width: 24px;
                padding-top: 2px;
            }

            .news-content {
                flex: 1;
            }

            .news-title-link {
                font-size: 15px;
                font-weight: 700;
                color: #334155;
                text-decoration: none;
                transition: color 0.2s;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                line-height: 1.5;
            }

            .news-title-link:hover { color: #00a8e8; }

            .news-meta {
                display: flex;
                gap: 12px;
                margin-top: 6px;
                font-size: 12px;
                color: #94a3b8;
            }

            .source-tag {
                font-weight: 800;
                color: #94a3b8;
            }

            /* Full-width AI Analysis Card */
            .ai-card {
                grid-column: 1 / -1;
                height: auto;
                background: #0f172a;
                color: #f1f5f9;
                padding: 40px;
                border-radius: 24px;
                margin-bottom: 30px;
                border: none;
                border-top: 6px solid var(--accent-cyan);
            }

            .ai-card .card-title { color: #ffffff; font-size: 24px; margin-bottom: 20px; display: block; }
            .ai-content { 
                font-size: 16px; 
                color: #e2e8f0; 
                white-space: pre-wrap; 
                line-height: 2;
                letter-spacing: 0.5px;
            }

            /* --- Visual Configuration Modal Styles --- */
            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(15, 23, 42, 0.6);
                backdrop-filter: blur(8px);
                z-index: 1000;
                display: none;
                justify-content: center;
                align-items: center;
            }

            .modal-window {
                position: absolute;
                width: 90vw;
                height: 90vh;
                max-width: 1400px;
                background: white;
                border-radius: 24px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                resize: both;
                min-width: 800px;
                min-height: 500px;
                border: 1px solid #e2e8f0;
            }

            .modal-header {
                height: 60px;
                background: #1e293b;
                color: white;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 24px;
                cursor: move;
                user-select: none;
            }

            .modal-title {
                font-weight: 800;
                font-size: 16px;
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .modal-controls {
                display: flex;
                gap: 12px;
            }

            .action-btn {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.2s;
                color: #cbd5e1;
                background: rgba(255, 255, 255, 0.05);
            }

            .action-btn:hover {
                background: rgba(255, 255, 255, 0.15);
                color: white;
                transform: scale(1.1);
            }

            .modal-body {
                flex: 1;
                position: relative;
                background: #f8fafc;
            }

            iframe#config-iframe {
                width: 100%;
                height: 100%;
                border: none;
            }

            .active-modal {
                display: flex !important;
                animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            }

            @keyframes modalFadeIn {
                from { opacity: 0; transform: scale(0.95); }
                to { opacity: 1; transform: scale(1); }
            }

            /* Controls Overlay Group (Mobile fallback) */
            .controls { display: none; }

            #loading {
                display: none;
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(255,255,255,0.9);
                backdrop-filter: blur(10px);
                z-index: 2000;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .spinner {
                width: 60px; height: 60px;
                border: 5px solid #f1f5f9;
                border-top: 5px solid var(--accent-cyan);
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

            /* Print/Export hides */
            .is-exporting .controls { display: none !important; }

            @media (max-width: 900px) {
                .header-buttons { position: static; margin-top: 15px; }
                .header-main { flex-direction: column; }
                .meta-box { padding: 15px; gap: 20px; flex-wrap: wrap; justify-content: center; }
            }
        </style>
    </head>
    <body>
        <div id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 20px; font-weight: 700; color: #1e293b;">同步中 / Synchronizing...</p>
        </div>

        <div class="container" id="main-content">
            <header class="header">
                <div class="header-top-tag">AIYX DATA TECH NEWS POOL</div>
                <div class="header-main">
                    <div class="header-title-group">
                        <h1 class="header-title">TECH NEWS 热点分析</h1>
                        <span class="version-tag">V1.01.0312</span>
                    </div>
                    <div class="header-buttons">
                        <button class="header-btn" onclick="openConfig()">
                            <i class="fas fa-cog"></i> 可视化配置 / Config
                        </button>
                        <button class="header-btn" onclick="triggerRefresh(this)">
                            <i class="fas fa-sync-alt"></i> 刷新数据 / Refresh
                        </button>
                        <button class="header-btn" onclick="exportLongImage()">
                            <i class="fas fa-image"></i> 保存图片 / Save
                        </button>
                    </div>
                </div>
                
                <div class="meta-box">
                    <div class="meta-entry">
                        <span class="meta-key">NODE</span>
                        <span class="meta-val">当前榜单</span>
                    </div>
                    <div class="meta-entry">
                        <span class="meta-key">新闻总数</span>
                        <span class="meta-val">2 条</span>
                    </div>
                    <div class="meta-entry">
                        <span class="meta-key">热点关键词</span>
                        <span class="meta-val">1 个</span>
                    </div>
                    <div class="meta-entry">
                        <span class="meta-key">生成时间</span>
                        <span class="meta-val">03-12 19:18</span>
                    </div>
                </div>
            </header>

            <div class="cards-grid">
    
                <div class="card">
                    <div class="card-header" style="border-top-color: #00f2ff">
                        <span class="card-title"><span style="color: #00f2ff">🔥</span> 测试热点</span>
                        <span class="card-count">15 items</span>
                    </div>
                    <div class="card-body">
                        <ul class="news-list">
        
                            <li class="news-item">
                                <span class="news-rank">01</span>
                                <div class="news-content">
                                    <a href="http://example.com/1" class="news-title-link" target="_blank">测试新闻 1</a>
                                    <div class="news-meta">
                                        <span class="source-tag">百度</span>
                                    </div>
                                </div>
                            </li>
            
                            <li class="news-item">
                                <span class="news-rank">02</span>
                                <div class="news-content">
                                    <a href="http://example.com/2" class="news-title-link" target="_blank">测试新闻 2</a>
                                    <div class="news-meta">
                                        <span class="source-tag">微博</span>
                                    </div>
                                </div>
                            </li>
            
                        </ul>
                    </div>
                </div>
        
            </div><!-- end cards-grid -->
            
            <footer style="margin-top: 50px; text-align: center; color: #94a3b8; font-size: 13px; padding-bottom: 50px;">
                TrendRadar AI Data Top &copy; 2026 Powered by AIYX Data Tech
            </footer>
        </div>

        <div class="controls">
            <button class="btn btn-refresh" onclick="triggerRefresh()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                刷新数据
            </button>
            <button class="btn btn-image" onclick="exportLongImage()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                导出长图
            </button>
        </div>

        <script>
            function triggerRefresh() {
                document.getElementById('loading').style.display = 'flex';
                fetch('/api/refresh', { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        if(data.success) {
                            window.location.reload();
                        } else {
                            alert('Refresh failed: ' + data.error);
                            document.getElementById('loading').style.display = 'none';
                        }
                    })
                    .catch(e => {
                        console.error(e);
                        document.getElementById('loading').style.display = 'none';
                    });
            }

            async function exportLongImage() {
                const body = document.body;
                body.classList.add('is-exporting');
                
                try {
                    const canvas = await html2canvas(document.getElementById('main-content'), {
                        useCORS: true,
                        scale: 2,
                        backgroundColor: '#f0f4f8'
                    });
                    
                    const link = document.createElement('a');
                    link.download = `TrendRadar_Report_${new Date().getTime()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (e) {
                    console.error('Export failed', e);
                } finally {
                    body.classList.remove('is-exporting');
                }
            }

        // --- Visual Configuration Modal Logic ---
        function openConfig() {{
            document.getElementById('config-overlay').classList.add('active-modal');
        }}

        function closeConfig() {{
            document.getElementById('config-overlay').classList.remove('active-modal');
        }}

        // Draggable Modal Logic
        (function() {{
            const modal = document.getElementById('config-modal');
            const handle = document.getElementById('modal-drag-handle');
            let isDragging = false;
            let offsetModalX, offsetModalY;

            handle.addEventListener('mousedown', (e) => {{
                if (e.target.closest('.action-btn')) return;
                isDragging = true;
                offsetModalX = e.clientX - modal.offsetLeft;
                offsetModalY = e.clientY - modal.offsetTop;
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                document.body.style.userSelect = 'none';
            }});

            function onMouseMove(e) {{
                if (!isDragging) return;
                let left = e.clientX - offsetModalX;
                let top = e.clientY - offsetModalY;
                left = Math.max(0, Math.min(left, window.innerWidth - modal.offsetWidth));
                top = Math.max(0, Math.min(top, window.innerHeight - modal.offsetHeight));
                modal.style.left = left + 'px';
                modal.style.top = top + 'px';
                modal.style.margin = '0';
            }}

            function onMouseUp() {{
                isDragging = false;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                document.body.style.userSelect = 'auto';
            }}
        }})();
    </script>
        </div>

        <!-- Visual Configuration Modal Container -->
        <div class="modal-overlay" id="config-overlay">
            <div class="modal-window" id="config-modal">
                <div class="modal-header" id="modal-drag-handle">
                    <div class="modal-title">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                        TrendRadar 可视化配置中心 / Config Center
                    </div>
                    <div class="modal-controls">
                        <div class="action-btn" title="刷新报告 / Refresh Report" onclick="location.reload()">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                        </div>
                        <div class="action-btn" title="关闭面板 / Close Panel" onclick="closeConfig()">
                            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="modal-body">
                    <iframe id="config-iframe" src="config_editor/index.html"></iframe>
                </div>
            </div>
        </div>
    </body>
    </html>
